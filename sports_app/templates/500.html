<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error | PIEMR Sports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(135deg, #0d1b2a, #2d1b1b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .error-container { text-align: center; color: white; padding: 40px 20px; position: relative; z-index: 1; }
        .error-number {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #dc3545, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .error-icon { font-size: 4rem; margin-bottom: 20px; animation: shake 0.5s ease infinite alternate; }
        @keyframes shake { from{transform:rotate(-5deg)} to{transform:rotate(5deg)} }
        .error-title { font-size: 2rem; font-weight: 800; margin-bottom: 15px; }
        .error-subtitle { color: rgba(255,255,255,0.6); font-size: 1.05rem; margin-bottom: 40px; max-width: 450px; margin-left: auto; margin-right: auto; }
        .error-btn {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white; border: none; border-radius: 30px;
            padding: 14px 35px; font-weight: 700; font-size: 0.95rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.3s; margin: 8px;
        }
        .error-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(220,53,69,0.4); color: white; }
        .error-btn-outline {
            background: transparent; color: white; border: 2px solid rgba(255,255,255,0.3);
            border-radius: 30px; padding: 12px 33px; font-weight: 600;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.3s; margin: 8px;
        }
        .error-btn-outline:hover { border-color: white; background: rgba(255,255,255,0.1); color: white; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
        .orb-1 { width: 400px; height: 400px; background: rgba(220,53,69,0.1); top: -100px; right: -100px; }
        .orb-2 { width: 300px; height: 300px; background: rgba(26,60,110,0.3); bottom: -100px; left: -50px; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="error-container">
        <div class="error-icon">⚡</div>
        <div class="error-number">500</div>
        <h2 class="error-title">Technical Foul!</h2>
        <p class="error-subtitle">
            Something went wrong on our end. Our team has been notified and is working on a fix. Please try again shortly.
        </p>
        <div>
            <a href="/" class="error-btn">
                <i class="fas fa-home"></i> Back to Home
            </a>
            <a href="javascript:location.reload()" class="error-btn-outline">
                <i class="fas fa-redo"></i> Try Again
            </a>
        </div>
    </div>
</body>
</html>
