{% extends 'sports_app/base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background:linear-gradient(135deg,#f5f7fa,#e9ecef);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7 text-center">
                <div style="width:90px;height:90px;background:linear-gradient(135deg,#28a745,#20c997);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 25px;animation:bounceIn 0.6s ease;">
                    <i class="fas fa-check fa-2x text-white"></i>
                </div>
                <h2 class="fw-bold">Password Reset!</h2>
                <p class="text-muted mt-3 mb-4">
                    Your password has been successfully reset. You can now login with your new password.
                </p>
                <a href="{% url 'login' %}" class="btn btn-primary-custom btn-lg">
                    <i class="fas fa-sign-in-alt me-2"></i>Login Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
