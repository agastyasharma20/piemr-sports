{% extends 'sports_app/base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="min-vh-100 d-flex align-items-center py-5" style="background:linear-gradient(135deg,#f5f7fa,#e9ecef);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="text-center mb-4">
                    <div style="width:70px;height:70px;background:linear-gradient(135deg,#1a3c6e,#0d1b2a);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;">
                        <i class="fas fa-key text-warning fs-3"></i>
                    </div>
                    <h2 class="fw-bold mt-3">Forgot Password?</h2>
                    <p class="text-muted">Enter your email and we'll send you a reset link</p>
                </div>
                <div class="form-card">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100 btn-lg">
                            <i class="fas fa-paper-plane me-2"></i>Send Reset Link
                        </button>
                    </form>
                    <hr>
                    <p class="text-center text-muted mb-0">
                        Remember your password? <a href="{% url 'login' %}" class="fw-bold" style="color:#1a3c6e;">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
